name: Deploy to GitHub Pages

# main へ push されるたびに Web 版(build/webDist)をビルドして GitHub Pages へ公開する。
# 事前に GitHub のリポジトリ設定で Settings → Pages → Build and deployment → Source を
# 「GitHub Actions」に設定しておくこと。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は 1 つに(古いデプロイはキャンセル)。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build web distribution
        run: |
          chmod +x ./gradlew
          ./gradlew webDist --no-daemon --console=plain

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # 可能なら Pages を自動で有効化する(権限があれば設定操作が不要になる)。
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/webDist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
